# =============================================================
# Splunk Universal Forwarder - inputs.conf
# Location: C:\Program Files\SplunkUniversalForwarder\etc\system\local\inputs.conf
# Purpose: Define which Windows logs to collect and forward
# Author: Harish Goud
# =============================================================

# Windows Security Log
# Contains: Logon/Logoff, Account Management, Policy Changes
# Key Event IDs: 4624, 4625, 4720, 4732, 4740, 4698
[WinEventLog://Security]
index = windows_logs
disabled = false
start_from = oldest
current_only = false
checkpointInterval = 5

# Windows System Log
# Contains: Service events, System-level activity
[WinEventLog://System]
index = windows_logs
disabled = false
start_from = oldest

# Windows Application Log
[WinEventLog://Application]
index = windows_logs
disabled = false
start_from = oldest

# Sysmon Operational Log
# Contains: Process creation (EID 1), Network (EID 3), File (EID 11), Registry (EID 13)
# renderXml=true ensures all Sysmon fields are properly parsed
[WinEventLog://Microsoft-Windows-Sysmon/Operational]
index = windows_logs
disabled = false
renderXml = true
start_from = oldest
checkpointInterval = 5
