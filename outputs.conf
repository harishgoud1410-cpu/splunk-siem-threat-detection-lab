# =============================================================
# Splunk Universal Forwarder - outputs.conf
# Location: C:\Program Files\SplunkUniversalForwarder\etc\system\local\outputs.conf
# Purpose: Forward collected logs to Splunk Enterprise indexer
# Author: Harish Goud
# =============================================================

[tcpout]
defaultGroup = splunk_indexer

# Replace <SPLUNK_LINUX_IP> with your actual Splunk Enterprise IP address
# Default receiving port is 9997
[tcpout:splunk_indexer]
server = <SPLUNK_LINUX_IP>:9997
compressed = true
